<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product List</title>
  </head>

  <body>
    <div>
      <div class="list-of-products"></div>
    </div>

    <script>
      // Get the container element where products will be displayed
      const productListContainer = document.getElementsByClassName('list-of-products')[0];

      // This function renders the products inside the HTML container
      function renderProducts(productArray, containerElement) {
        containerElement.innerHTML = productArray
          .map(function (product) {
            return `
              <p>${product.title}</p>
            `;
          })
          .join('');
      }

      // This function fetches the product list from the API
      async function fetchListOfProducts() {
        try {
          const apiResponse = await fetch('https://dummyjson.com/products', {
            method: 'GET',
          });

          const result = await apiResponse.json();

          // Check if products exist before rendering
          if (result?.products?.length > 0) {
            renderProducts(result.products, productListContainer);
          }

          console.log(result);
        } catch (error) {
          console.error('Error fetching products:', error);
        }
      }

      // Call the function to fetch and display products
      fetchListOfProducts();
    </script>
  </body>
</html>
